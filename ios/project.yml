# project.yml — XcodeGen spec for the RustyNES v1.9.0 "Sunrise" iOS/iPadOS app.
#
# A hand-written .pbxproj is too error-prone to author un-validated on Linux, so
# the project is generated from this declarative spec. CI (and the local build
# script) run `xcodegen generate --spec ios/project.yml` before xcodebuild /
# fastlane. The generated ios/RustyNES.xcodeproj is a build artifact (gitignored).
#
# The Rust FFI ships as a STATIC xcframework (RustyNESFFI.xcframework, built by
# scripts/build-ios-xcframework.sh). A static framework is LINKED, not embedded:
# `embed: false` (Xcode "Do Not Embed"). It carries no code signature of its own.
#
# v1.9.8 "Horizon" — the foss / App-Store distribution seam (ADR 0027 §3, the iOS
# counterpart of the Android `foss`/`play` split). The DEFAULT build is the `foss`
# channel (AltStore PAL / GitHub / TestFlight): ad-free, tracking-free, fully
# unlocked. To produce the future App-Store flavor, add `APPSTORE_BUILD` to that
# build configuration's `SWIFT_ACTIVE_COMPILATION_CONDITIONS`, e.g.:
#
#     settings:
#       base:
#         SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) APPSTORE_BUILD
#
# `BuildChannel.swift` reads that flag; `StoreManager` (Entitlements.swift) stays
# DORMANT until v2.1.0 regardless of channel, so both paths behave identically today.
#
# Localization (v1.9.8): RustyNES/Localizable.xcstrings (the EN+ES String Catalog) is
# picked up automatically — it lives under the `RustyNES` source path below, which
# XcodeGen includes wholesale, so no explicit resource entry is needed.
name: RustyNES
options:
  bundleIdPrefix: com.doublegate
  # v2.0.7 "Trim": reconciled to iOS 17.0 to match the code's actual floor. The
  # SwiftUI shell uses `NavigationStack` (iOS 16) and, at 12+ unguarded sites,
  # `ToolbarItem(placement: .topBarTrailing)` (iOS 17), so the prior "15.0" was never
  # actually buildable — it was an aspirational declaration, not a supported floor.
  # This is the MINIMUM OS the app runs on; it is SEPARATE from the App Store
  # BUILD-SDK floor (Xcode 26 / iOS 26 SDK, mandatory for uploads from 2026-04-28),
  # which is pinned in .github/workflows/ios.yml. To target a lower OS, the
  # `.topBarTrailing` / `NavigationStack` usages must first be availability-guarded.
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    # The app is iPhone + iPad (device family 1,2 = Universal).
    TARGETED_DEVICE_FAMILY: "1,2"
    # Keep in step with the workspace version (CHANGELOG / Cargo `[workspace.package]`).
    # Realigned to the workspace version at v2.0.5 "Landfall" (the frozen v1.9.x train
    # never bumped past the v1.9.1 checked-in default, since fastlane injected the real
    # number); advanced per release through the iOS finalization window (v2.0.5→v2.0.8).
    MARKETING_VERSION: "2.0.8"
    # The build (not marketing) number. Each TestFlight upload needs a UNIQUE one;
    # the fastlane `beta` lane overrides this with the CI run number at build time
    # (xcargs CURRENT_PROJECT_VERSION), so this checked-in "1" is only the local /
    # first-build default.
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_LANGUAGE: en
    # Signing is left to the CI / maintainer (fastlane match injects the team +
    # provisioning profile). Manual signing keeps the checked-in project free of
    # any developer-specific team id.
    CODE_SIGN_STYLE: Manual

targets:
  RustyNES:
    type: application
    platform: iOS
    # v2.0.7 "Trim": iOS 17.0 to match the actual API floor (see options.deploymentTarget).
    deploymentTarget: "17.0"
    sources:
      - path: RustyNES
      # The UniFFI-generated Swift surface (NesController et al.). Built by the
      # xcframework script; checked in / regenerated as RustyNESCore.swift. The
      # placeholder .gitkeep keeps the dir present before the first generation.
      - path: Generated
        excludes:
          - ".gitkeep"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.doublegate.rustynes
        INFOPLIST_FILE: RustyNES/Info.plist
        CODE_SIGN_ENTITLEMENTS: RustyNES/RustyNES.entitlements
        # The bridging header pulls in the hand-written C glue (rustynes_ios.h)
        # so Swift can call the Metal/audio FFI directly.
        SWIFT_OBJC_BRIDGING_HEADER: RustyNES/RustyNES-Bridging-Header.h
        # The xcframework ships its own Clang modulemap dir per slice; point the
        # importer at the headers so `import RustyNESHostGlue` (the glue module)
        # and the UniFFI FFI module resolve.
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      # The static Rust FFI. Linked, NOT embedded (a static archive cannot be
      # embedded/signed) — "Do Not Embed".
      - framework: RustyNESFFI.xcframework
        embed: false
      # System frameworks the host links against.
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: GameController.framework
      - sdk: AVFoundation.framework
      - sdk: UIKit.framework
      # v1.9.2: optional Core Haptics feedback for on-screen button presses.
      - sdk: CoreHaptics.framework
      # v1.9.8 "Horizon" (store-readiness):
      #   ReplayKit  — gameplay screen capture (ScreenRecorder.swift).
      #   GameKit    — opt-in Game Center sign-in + access point (GameCenterModel.swift).
      #   StoreKit   — the DORMANT StoreKit 2 scaffold (StoreManager in Entitlements.swift);
      #                linked now so the v2.1.0 App-Store-flavor wiring is a drop-in.
      - sdk: ReplayKit.framework
      - sdk: GameKit.framework
      - sdk: StoreKit.framework
    info:
      path: RustyNES/Info.plist

schemes:
  RustyNES:
    build:
      targets:
        RustyNES: all
    run:
      config: Debug
    archive:
      config: Release
