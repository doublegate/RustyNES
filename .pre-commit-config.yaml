---
# Pre-commit hooks for RustyNES
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # General file fixes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # The three hooks below REWRITE files rather than just checking them, so
      # they must not touch trees we do not author. Without this exclusion a
      # `pre-commit run --all-files` silently reformats vendored upstream source
      # and the immutable reference corpus — observed: 41 files across the
      # vendored TriCNES C#, the vendored rcheevos C, `ref-docs/`, an upstream
      # font licence, and upstream test-ROM READMEs. That destroys the "kept
      # pristine / byte-identical to upstream" property those trees exist for,
      # and pollutes any diff that happens to run the hooks broadly.
      #
      # `.markdownlintignore` already exempts most of these for markdownlint;
      # this is the equivalent for the whitespace fixers, which had no exclusion
      # at all. Scope is deliberately narrower than `.markdownlintignore`: only
      # content we did not write (vendored / upstream / immutable reference).
      # Frozen-but-ours trees (`docs/archive/`, `to-dos/plans/`, …) stay in
      # scope — they are our prose, and whitespace hygiene on them is harmless.
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: &vendored_trees |
          (?x)^(
            ref-docs/
            |ref-proj/
            |crates/rustynes-test-harness/golden/tricnes/
            |crates/rustynes-cheevos/vendor/
            |tests/roms/
            |assets/RustyNES_Icon/OFL\.txt$
          )
      - id: end-of-file-fixer
        exclude: *vendored_trees
      - id: check-yaml
        # mkdocs.yml uses Material for MkDocs' documented `!!python/name:` YAML
        # tags (pymdownx.emoji icon rendering), which check-yaml's safe_load
        # rejects; the mkdocs build itself validates the file in CI.
        #
        # .gitlab-ci.yml is handled by the `--unsafe` pass below rather than
        # excluded outright, so it still gets a real syntax check.
        exclude: ^(mkdocs\.yml|\.gitlab-ci\.yml)$
      # .gitlab-ci.yml uses GitLab's `!reference [job, key]` tag to compose the
      # libretro build templates' own `before_script` (exporting SDKROOT / CC /
      # CXX for the Apple jobs) with our `rustup target add` step. GitLab's
      # `extends` REPLACES array-valued keys rather than merging them, so
      # `!reference` is the only way to add a step without forking upstream's
      # internals into this repo. It is a GitLab-specific tag that PyYAML's
      # safe_load cannot construct, so this file gets `--unsafe`: syntax and
      # duplicate keys are still validated, only tag construction is skipped.
      - id: check-yaml
        name: check yaml (gitlab-ci, custom tags)
        args: [--unsafe]
        files: ^\.gitlab-ci\.yml$
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
        # Third rewriting hook — same exclusion. Upstream `.resx` / `.csproj`
        # files in the vendored TriCNES tree legitimately carry CRLF.
        exclude: *vendored_trees

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json]

  # Rust formatting and linting (when code exists)
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        # NOT `--all-features`: since v1.2.0 F4, `rustynes-script`'s `script-wasm`
        # (piccolo, wasm) and the frontend's `scripting` (mlua, native) are
        # mutually exclusive — `--all-features` can't resolve both. This mirrors
        # the CI gate (`ci.yml` runs `--workspace --all-targets`; the feature-
        # gated paths are covered by CI's dedicated `--features ...` clippy jobs).
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
