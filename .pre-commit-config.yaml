---
# Pre-commit hooks for RustyNES
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # General file fixes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json]

  # Rust formatting and linting (when code exists)
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        # NOT `--all-features`: since v1.2.0 F4, `rustynes-script`'s `script-wasm`
        # (piccolo, wasm) and the frontend's `scripting` (mlua, native) are
        # mutually exclusive — `--all-features` can't resolve both. This mirrors
        # the CI gate (`ci.yml` runs `--workspace --all-targets`; the feature-
        # gated paths are covered by CI's dedicated `--features ...` clippy jobs).
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
