# RustyNES libretro core — buildbot recipe.
#
# Populates RetroArch's built-in core downloader via the shared libretro CI
# templates (git.libretro.com/libretro-infrastructure/ci-templates). Added
# per https://github.com/doublegate/RustyNES/issues/311.
#
# `CORENAME` is `rustynes`, NOT `rustynes_libretro` or `rustynes-libretro`:
# these templates always run a fixed `mv lib${CORENAME}.<ext>
# ${CORENAME}_libretro.<ext>` step. `crates/rustynes-libretro/Cargo.toml`
# sets `[lib] name = "rustynes"` explicitly (its `[package] name` stays
# `rustynes-libretro` for `-p rustynes-libretro` scoping everywhere else),
# so `CORENAME=rustynes` makes both the compiled-artifact name and the
# final packaged name resolve correctly to `rustynes_libretro.<ext>` —
# matching the already-published `rustynes_libretro.info`.
#
# `cargo build --release --target <triple>` here runs from the repo root
# with no `-p` flag (the template scripts are centrally maintained and not
# per-core editable); the root `Cargo.toml`'s `[workspace] default-members =
# ["crates/rustynes-libretro"]` is what scopes that bare command to just
# this crate instead of all 18 workspace members.
#
# Platform scope: mirrors the two proven, currently-building reference
# cores (doukutsu-rs-libretro, holani-retro) minus platforms we have
# concrete evidence won't build — no `rust-libnx*.yml` template exists in
# ci-templates (Nintendo Switch is not buildable this way for a Rust core
# today), and no reference core includes webOS. Both can be added later
# once the basics are proven on the buildbot.
#
# ---------------------------------------------------------------------------
# Why every job carries a `before_script` (pipeline #91899 post-mortem)
# ---------------------------------------------------------------------------
# The first buildbot run passed only `libretro-build-linux-x64`; the other
# nine died with `E0463: can't find crate for core`. Root cause is entirely
# on our side, not the build images:
#
# This repo pins its toolchain in `rust-toolchain.toml` (`channel =
# "1.96.0"`). The build image ships its own default toolchain with every
# libretro cross target pre-provisioned — but our pin makes rustup download
# and install a SEPARATE, pristine 1.96.0 toolchain on the first `cargo`
# invocation, and that toolchain carries only the host `rust-std` plus the
# two targets `rust-toolchain.toml` declares (`thumbv7em-none-eabihf`,
# `wasm32-unknown-unknown`). Every job whose `TARGET_ARCH` is not the host
# triple therefore had no `core`/`std` to link against. Linux x64 passed
# purely because its target IS the host triple.
#
# The fix is one `rustup target add` per job, into the pinned toolchain.
# `before_script` runs inside the checkout, so rustup resolves
# `rust-toolchain.toml` and installs the target where cargo will look for
# it. This is deliberately NOT solved by appending the eight triples to
# `rust-toolchain.toml`'s `targets = [...]`: that would force every
# contributor and every GitHub Actions job to download ~8 extra `rust-std`
# components on each toolchain install, imposing a large permanent cost on
# everyone to serve one downstream CI. Keep the cost where the need is.
#
# The Apple jobs must NOT `extends: .rust-target-install` — their upstream
# templates already define a `before_script` (exporting `SDKROOT` / `STRIP`
# / `CC` / `CXX`), and GitLab's `extends` REPLACES array-valued keys rather
# than merging them, so extending would silently drop the SDK and
# cross-compiler environment. They compose via `!reference` instead, which
# pulls in the template's own `before_script` verbatim without duplicating
# (and thereby forking) upstream's internals here.

.core-defs:
  variables:
    CORENAME: rustynes

# Shared `before_script` for the jobs whose upstream template defines none
# (Windows, Linux, and all four Android). See the post-mortem above.
.rust-target-install:
  before_script:
    - rustup target add ${RUST_TARGET}

include:
  ################################## DESKTOPS ################################
  # Windows 64-bit
  - project: 'libretro-infrastructure/ci-templates'
    file: '/rust-windows-x64.yml'

  # Linux 64-bit
  - project: 'libretro-infrastructure/ci-templates'
    file: '/rust-linux-x64.yml'

  # macOS/iOS/tvOS
  - project: 'libretro-infrastructure/ci-templates'
    file: '/rust-apple.yml'

  ################################## CELLULAR ################################
  # Android
  - project: 'libretro-infrastructure/ci-templates'
    file: '/rust-android-jni.yml'

stages:
  - build-prepare
  - build-shared
  - build-static

################################### DESKTOPS #################################
# Windows 64-bit
libretro-build-windows-x64:
  extends:
    - .libretro-rust-windows-x64-default
    - .core-defs
    - .rust-target-install
  variables:
    RUST_TARGET: x86_64-pc-windows-gnu

# Linux 64-bit
# `RUST_TARGET` is the host triple here, so the `rustup target add` is a
# no-op — declared anyway so every job states its target the same way and a
# future host-image change can't silently reintroduce the #91899 failure.
libretro-build-linux-x64:
  extends:
    - .libretro-rust-linux-x64-default
    - .core-defs
    - .rust-target-install
  variables:
    RUST_TARGET: x86_64-unknown-linux-gnu

# macOS 64-bit
libretro-build-osx-x64:
  extends:
    - .libretro-rust-osx-x86_64-default
    - .core-defs
  variables:
    RUST_TARGET: x86_64-apple-darwin
  before_script:
    - !reference [.libretro-rust-osx-x86_64-default, before_script]
    - rustup target add ${RUST_TARGET}

# macOS ARM 64-bit
libretro-build-osx-arm64:
  extends:
    - .libretro-rust-osx-arm64-default
    - .core-defs
  variables:
    RUST_TARGET: aarch64-apple-darwin
  before_script:
    - !reference [.libretro-rust-osx-arm64-default, before_script]
    - rustup target add ${RUST_TARGET}

################################### CELLULAR #################################
# Android ARMv7a
# `cargo ndk -t <abi>` resolves the ABI name to a Rust target triple, so
# `RUST_TARGET` is that triple (NOT the `ANDROID_ABI` value) for the two
# ABI-named jobs; the x86 jobs already use triples as their ABI value.
android-armeabi-v7a:
  extends:
    - .libretro-rust-android-jni-armeabi-v7a
    - .core-defs
    - .rust-target-install
  variables:
    RUST_TARGET: armv7-linux-androideabi

# Android ARMv8a
android-arm64-v8a:
  extends:
    - .libretro-rust-android-jni-arm64-v8a
    - .core-defs
    - .rust-target-install
  variables:
    RUST_TARGET: aarch64-linux-android

# Android 64-bit x86
android-x86_64:
  extends:
    - .libretro-rust-android-jni-x86_64
    - .core-defs
    - .rust-target-install
  variables:
    RUST_TARGET: x86_64-linux-android

# Android 32-bit x86
android-x86:
  extends:
    - .libretro-rust-android-jni-x86
    - .core-defs
    - .rust-target-install
  variables:
    RUST_TARGET: i686-linux-android

# iOS
libretro-build-ios-arm64:
  extends:
    - .libretro-rust-ios-arm64-default
    - .core-defs
  variables:
    RUST_TARGET: aarch64-apple-ios
  before_script:
    - !reference [.libretro-rust-ios-arm64-default, before_script]
    - rustup target add ${RUST_TARGET}

# tvOS
#
# Unlike the other three Apple jobs, the upstream tvOS template also overrides
# `script`, replacing the shared Apple build line with
#
#   cargo +nightly build -Zbuild-std --target aarch64-apple-tvos --release
#
# That dates from when `aarch64-apple-tvos` was a tier-3 target with no
# distributed `rust-std`, making `-Zbuild-std` — and therefore nightly — the
# only way to build it. The target has since been promoted and rustup now
# ships a complete prebuilt std for it, `panic_abort` included, so the
# override is obsolete. Verified against the pinned 1.96.0:
# `rustup target add aarch64-apple-tvos` installs 26 rlibs (`panic_abort`
# among them) and `cargo check --release -p rustynes-libretro --target
# aarch64-apple-tvos` compiles the entire graph, bindgen included.
#
# Restoring the shared script puts tvOS on the same pinned 1.96.0 as every
# other job, and dissolves three separate workarounds this job used to need
# rather than accumulating a fourth:
#
#   1. MSRV. `+nightly` outranks BOTH `rust-toolchain.toml` and
#      `RUSTUP_TOOLCHAIN`, pinning the job to the image's stale
#      1.94.0-nightly — below the workspace's `rust-version = "1.96"`, so
#      cargo's MSRV gate failed before compiling anything. The job had to
#      uninstall and reinstall the nightly channel to get past it.
#   2. `panic_abort`. A bare `-Zbuild-std` builds `std` but NOT
#      `panic_abort`, which `[profile.release] panic = "abort"` requires, so
#      the cdylib failed to link with `E0463`. The crate list is hardcoded in
#      the template and `CARGO_UNSTABLE_BUILD_STD` cannot override it (the
#      CLI `-Z` flag wins), so the job had to force `panic = "unwind"` via
#      `CARGO_PROFILE_RELEASE_PANIC`. The prebuilt std ships `panic_abort`,
#      so the profile is now honoured as written and tvOS matches every
#      other platform.
#   3. `-C ar`. Refreshing to a current nightly then failed with
#      `error: `-C ar`: this option has been removed`. The build image
#      injects `-Car=<path>,Clink-arg=...` into every Apple job, and that
#      long-deprecated no-op became a hard error in Rust 1.97 (bisected:
#      1.96.1 warns, 1.97.1 errors). On the pinned 1.96.0 it is still only a
#      warning — exactly as it already was for the three Apple jobs that
#      were green throughout.
#
# `!reference [.libretro-rust-apple-base, script]` pulls in the generic Apple
# build/package steps instead of duplicating them here, so upstream fixes to
# that script keep reaching this job. It drives off `TARGET_ARCH`, which the
# tvOS template already sets to `aarch64-apple-tvos`, and honours the same
# `STRIP_CORE_LIB` / `DSYM_CORE_LIB` flags the template sets.
#
# NOTE: `-C ar` is still a latent hazard for ALL FOUR Apple jobs, now
# including this one. Read `rust-toolchain.toml` before bumping `channel` to
# 1.97 or newer.
libretro-build-tvos-arm64:
  extends:
    - .libretro-rust-tvos-arm64-default
    - .core-defs
  variables:
    RUST_TARGET: aarch64-apple-tvos
  before_script:
    - !reference [.libretro-rust-tvos-arm64-default, before_script]
    - rustup target add ${RUST_TARGET}
  script:
    - !reference [.libretro-rust-apple-base, script]
