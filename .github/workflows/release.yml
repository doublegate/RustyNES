name: Release

# Triggered on push of a version tag (e.g. v1.0.0, v1.0.1-rc1). Also exposed
# via workflow_dispatch for manual debugging from the Actions tab.
#
# Each matrix entry builds the `rustynes` binary in release mode, strips it
# (where applicable), bundles it with the README and both LICENSE files, and
# uploads the resulting archive to the GitHub Release matching the pushed tag.
#
# softprops/action-gh-release@v3 is used; v1 was deprecated mid-2025 and v2
# (Node 20) joined the Node-20-deprecated set in 2026 — v3 moves the action
# runtime to Node 24 with no input-surface changes. Permissions are
# minimum-necessary (contents: write only).
#
# Linux musl + cross-compiled aarch64 Linux are intentionally NOT in the matrix
# for the v1.0 cut: Sprint 5-3's exit criterion is "binary builds and runs on
# Linux/macOS/Windows", not "all libc variants". Adding musl would pull in
# cross-rs + vendored OpenSSL plumbing that is out of scope for this sprint.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.0). Used only on workflow_dispatch."
        required: true
        type: string
  # Invoked by `release-auto.yml` after a new version goes final-green on main.
  # A tag pushed by the built-in GITHUB_TOKEN does NOT trigger `on: push: tags`
  # (GitHub's recursion guard), so the auto-release path calls this workflow
  # directly via `uses:` rather than relying on the tag-push event.
  workflow_call:
    inputs:
      tag:
        description: "Tag to build + attach assets to (e.g. v1.9.9)."
        required: true
        type: string

# Don't kill a release mid-build if a second tag lands on the same ref.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    # 30 minutes is ~6x the historical aarch64-apple-darwin build wall-clock
    # (~2.5 min) and ~4x the cold-cache Linux/Windows time. The Intel macOS
    # job in particular was hanging indefinitely in the runner queue (24h+
    # before manual cancel) when targeting the deprecated `macos-13` label;
    # an explicit timeout ensures any future runner-allocation regression
    # fails fast instead of squatting the release queue.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            bin_name: rustynes
          # x86_64-apple-darwin was DROPPED in v1.6.0 (ADR 0009). The only
          # remaining Intel macOS runner label (`macos-15-intel`) is GitHub's
          # last x86_64 macOS image and is scheduled for removal in August 2027
          # (actions/runner-images#13045). Rather than carry a time-bomb or take
          # on cargo-zigbuild cross-compile + macOS-SDK-vendoring complexity for
          # a shrinking cohort, the release matrix ships aarch64 macOS only;
          # Intel-Mac users build from source (`cargo build --release -p
          # rustynes-frontend`). See docs/adr/0009-drop-x86_64-darwin-release-target.md.
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            bin_name: rustynes
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            bin_name: rustynes.exe
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # Shared toolchain + Linux deps (no-op on macOS/Windows) + cargo cache.
      # The per-target cache key keeps each platform's artifacts separate.
      - uses: ./.github/actions/rust-setup
        with:
          targets: ${{ matrix.target }}
          cache-key: release-${{ matrix.target }}

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          # `inputs.tag` is set for workflow_dispatch AND workflow_call; on a
          # tag push it is empty, so fall back to the pushed ref.
          if [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${tag}"

      - name: Build release binary
        run: cargo build --release -p rustynes-frontend --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip "target/${{ matrix.target }}/release/${{ matrix.bin_name }}"

      - name: Stage archive contents
        shell: bash
        run: |
          stage="rustynes-${{ steps.tag.outputs.tag }}-${{ matrix.target }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "$stage/"
          cp README.md LICENSE-MIT LICENSE-APACHE NOTICE CHANGELOG.md "$stage/"
          echo "stage=${stage}" >> "$GITHUB_ENV"

      - name: Create archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          tar -czf "${stage}.tar.gz" "${stage}"
          echo "asset=${stage}.tar.gz" >> "$GITHUB_ENV"

      - name: Create archive (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "$env:stage" -DestinationPath "$env:stage.zip"
          "asset=$env:stage.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # NOTE: do NOT set `body:` or `generate_release_notes: true` here.
      # softprops/action-gh-release runs once per matrix target and each
      # invocation OVERWRITES the release body, which clobbers the
      # comprehensive notes the maintainer authored manually via
      # `gh release edit --notes-file …` (v1.0.0 + v1.1.0 both hit this).
      # The release body is owned by the maintainer; CI only attaches
      # build artifacts.
      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: ${{ env.asset }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------------------------------
  # PGO build + promotion gate (linux x86_64 only).
  #
  # Runs the full instrument -> train -> optimized-rebuild cycle and its two
  # gates (>3% faster on `full_frame` AND byte-identical across the whole
  # `--features test-roms` oracle). Before v2.2.3 this ran on the same tag push
  # as the release but nothing consumed the result — a promoted binary was
  # computed and discarded. Now `pgo-linux-asset` below ships it.
  #
  # FAILURE SEMANTICS (note: `continue-on-error` is NOT permitted on a
  # reusable-workflow `uses:` job — actionlint rejects it — so the tolerance
  # lives inside pgo.yml instead):
  #
  #   * A GATE verdict (slower than the 3% bar, or an oracle divergence) is not
  #     a failure at all. pgo.yml's determinism step carries a step-level
  #     `continue-on-error`, so the gate simply reports promotable=false, this
  #     job stays green, and `pgo-linux-asset` below is skipped.
  #   * An INFRASTRUCTURE failure (runner died, cargo-pgo unavailable) does mark
  #     this job — and therefore the run — red. That is deliberate: a broken PGO
  #     pipeline should be visible, not swallowed. The RELEASE is still correct
  #     either way: `build` has already attached the plain assets for all three
  #     targets, and the replacement job below is skipped.
  #
  # Scope is deliberately linux-x86_64 ONLY — PGO training has to RUN the
  # instrumented binary, so each additional target needs its own native runner
  # doing a full train cycle. macOS-aarch64 and Windows keep shipping plain
  # release builds; extending PGO to them is a separate decision with a real
  # cost (~90 min of runner time each), not a freebie.
  pgo:
    name: PGO build + gate (linux x86_64)
    uses: ./.github/workflows/pgo.yml
    permissions:
      contents: read

  # Replace the Linux release asset with the PGO binary when — and only when —
  # the gate promoted it.
  #
  # Sequencing note: `build` attaches the plain Linux archive first (it finishes
  # in ~10 min; the PGO job takes up to 90), so for the intervening window the
  # release carries the plain binary and is then upgraded in place. That is the
  # deliberate trade: the release is complete and downloadable immediately
  # rather than gated behind an hour and a half of PGO, and the swap is
  # idempotent. The archive keeps the SAME name, so download links and
  # checksums-by-name do not change shape.
  pgo-linux-asset:
    name: Ship PGO binary as the linux asset
    needs: [build, pgo]
    if: needs.pgo.outputs.promotable == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Resolve release tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          # Same resolution as the `build` job: `inputs.tag` on
          # workflow_dispatch / workflow_call, else the pushed ref.
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Download the promoted PGO binary
        uses: actions/download-artifact@v7
        with:
          name: ${{ needs.pgo.outputs.artifact }}
          path: pgo-bin

      - name: Stage + archive (identical layout to the plain Linux asset)
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          target="x86_64-unknown-linux-gnu"
          stage="rustynes-${TAG}-${target}"
          mkdir -p "$stage"
          cp pgo-bin/rustynes "$stage/rustynes"
          chmod +x "$stage/rustynes"
          strip "$stage/rustynes"
          cp README.md LICENSE-MIT LICENSE-APACHE NOTICE CHANGELOG.md "$stage/"
          tar -czf "${stage}.tar.gz" "$stage"
          echo "asset=${stage}.tar.gz" >> "$GITHUB_ENV"

      # `gh release upload --clobber` rather than softprops/action-gh-release:
      # this is a REPLACEMENT of an asset the `build` job already attached under
      # the same name, and the API rejects a duplicate asset name without an
      # explicit overwrite. `--clobber` is that overwrite.
      - name: Replace the Linux asset with the PGO build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          SPEEDUP: ${{ needs.pgo.outputs.speedup_pct }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$TAG" "$asset" --clobber --repo "$GITHUB_REPOSITORY"
          {
            echo "### PGO binary shipped"
            echo
            echo "The \`x86_64-unknown-linux-gnu\` release asset is the"
            echo "profile-guided-optimized build (**${SPEEDUP}%** faster on"
            echo "\`full_frame\`, byte-identical across the full test-roms oracle)."
          } >> "$GITHUB_STEP_SUMMARY"
