name: iOS

# v1.9.0 "Sunrise" — the iOS/iPadOS TestFlight pipeline. Host CI (ci.yml) remains
# the authoritative accuracy/determinism gate (AccuracyCoin 100%, oracles,
# nestest); this workflow only builds the iOS host and ships it to TestFlight. It
# is tag- (and manual-) gated because macOS runner minutes bill ~10x Linux — the
# same gating posture as android.yml's heavier jobs and release.yml. Accuracy is
# never gated on a device toolchain.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  # v1.9.1 "Patch" — TestFlight build-refresh cadence. A TestFlight build expires
  # 90 days after upload; re-build + re-upload at 06:00 UTC on the 1st of every
  # other month (~60-day cadence) so external testers never lose access between
  # feature releases. No-op until the signing secrets are provisioned (the
  # documented maintainer carryover); `workflow_dispatch` covers off-cadence
  # refreshes.
  schedule:
    - cron: '0 6 1 */2 *'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  testflight:
    name: Build xcframework + TestFlight upload
    runs-on: macos-latest
    # The unattended SCHEDULED refresh is a clean no-op until signing is
    # provisioned: the maintainer sets the `IOS_SIGNING_READY` repo variable to
    # "true" once the App Store Connect key + fastlane match secrets exist, so a
    # cron run without secrets is SKIPPED (green) rather than spinning up a runner
    # every other month. Tag pushes and manual `workflow_dispatch` always run so
    # the xcframework build is exercised on demand; the TestFlight upload itself is
    # gated on the signing secrets being present (see the "Detect iOS signing
    # secrets" step below) and is SKIPPED — not failed — when they are absent. The
    # signing secrets are a documented maintainer-manual carryover (docs/ios.md),
    # so an un-provisioned repo must not paint every release tag push red.
    if: ${{ github.event_name != 'schedule' || vars.IOS_SIGNING_READY == 'true' }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # v2.0.7 "Trim" — App Store submission floor. From 2026-04-28 every App Store
      # Connect upload must be built with the iOS 26 SDK (Xcode 26). Select the newest
      # Xcode 26.x present on the runner so the xcframework + archive build against
      # that SDK; if the runner image predates it, fall back to the default toolchain
      # (which still exercises the compile — this job's real CI value) and warn rather
      # than fail. This pins the BUILD SDK only; the minimum OS stays at the
      # ios/project.yml deployment target.
      - name: Select Xcode 26 (iOS 26 SDK submission floor)
        run: |
          set -euo pipefail
          # macOS's BSD `sort` has no `-V` (a GNU extension), so pick the Xcode 26
          # toolchain with a POSIX-safe pipeline: prefer the canonical `Xcode_26.app`,
          # else the lexically-highest `Xcode_26.x.app` (26.0–26.9 order correctly under
          # plain `sort`). Using `sort -V` here would wrongly fall back on a real runner.
          xc=$(ls -d /Applications/Xcode_26.app /Applications/Xcode_26.*.app 2>/dev/null | sort | tail -1 || true)
          if [ -n "$xc" ]; then
            sudo xcode-select -s "$xc/Contents/Developer"
            echo "Selected $xc"
            xcodebuild -version
          else
            echo "::warning title=Xcode 26 not on runner::Building with $(xcodebuild -version | head -1). App Store uploads require Xcode 26 / the iOS 26 SDK from 2026-04-28 (App Store submission floor); ensure the release runner image has Xcode 26 before the v2.1.0 store launch."
          fi

      # The project toolchain (rust-toolchain.toml = 1.96) plus the iOS targets:
      # the device ABI + both simulator ABIs (the sim slice is lipo'd from the
      # Apple-silicon + Intel sim builds).
      - name: Install iOS Rust targets
        run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - uses: Swatinem/rust-cache@v2
        with:
          key: ios-xcframework

      # XcodeGen authors the .pbxproj from ios/project.yml (a hand-written project
      # is too error-prone to maintain).
      - name: Install XcodeGen
        run: brew install xcodegen

      # Builds the per-arch staticlibs, generates the Swift bindings, assembles
      # RustyNESFFI.xcframework, and runs `xcodegen generate`.
      - name: Build xcframework + generate project
        run: ./scripts/build-ios-xcframework.sh

      # Detect whether the maintainer-provisioned signing secrets exist. They are a
      # documented manual carryover (docs/ios.md "Maintainer-manual carryovers"):
      # the App Store Connect API key (ASC_*) + the fastlane match repo (MATCH_*).
      # Until they are set, an unattended `fastlane ios beta` aborts at
      # `app_store_connect_api_key` with `OpenSSL::PKey::EC: invalid curve name`
      # (it base64-decodes an EMPTY key), failing the whole job. The xcframework
      # build above is this job's real CI value (it proves the iOS host compiles),
      # so when signing is absent we SKIP the upload (green) instead of failing the
      # tag push. Provision the secrets to enable real uploads automatically.
      - name: Detect iOS signing secrets
        id: signing
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "$ASC_KEY_ID" ] && [ -n "$ASC_ISSUER_ID" ] && [ -n "$ASC_KEY_CONTENT" ] \
             && [ -n "$MATCH_GIT_URL" ] && [ -n "$MATCH_PASSWORD" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "App Store Connect + fastlane match secrets present - will build, sign, and upload to TestFlight."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=iOS signing not provisioned::Skipping TestFlight upload - the App Store Connect API key / fastlane match secrets are not set (a documented maintainer carryover). The xcframework build above already validated that the iOS host compiles. Provision ASC_KEY_ID / ASC_ISSUER_ID / ASC_KEY_CONTENT + MATCH_GIT_URL / MATCH_PASSWORD to enable uploads."
          fi

      - name: Install fastlane
        if: steps.signing.outputs.ready == 'true'
        run: gem install fastlane --no-document

      # Build + sign + upload to TestFlight. All credentials come from repo
      # secrets (the App Store Connect API key + the fastlane match signing repo);
      # nothing secret is checked in. Gated on the detection step above so a repo
      # without provisioned signing skips (rather than fails) this step.
      - name: Build and upload to TestFlight
        if: steps.signing.outputs.ready == 'true'
        run: fastlane ios beta
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
