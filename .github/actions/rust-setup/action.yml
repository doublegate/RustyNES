name: Rust setup
description: >-
  Shared toolchain + Linux system-deps + cargo cache setup, factored out of
  ci.yml / release.yml / web.yml so the install steps (and the wgpu/winit/cpal
  apt package list) live in exactly one place. Caller must `actions/checkout`
  first (a composite action needs the repo present to be resolved).

inputs:
  toolchain:
    description: >-
      Rust toolchain to install. Leave empty (the default) to use the channel
      from `rust-toolchain.toml`, which is the single source of truth for the
      project toolchain — set it there, not here. Only pass a value to install
      something deliberately different from the project pin.
    default: ""
  targets:
    description: "Comma-separated extra rustup targets (e.g. wasm32-unknown-unknown)."
    default: ""
  components:
    description: "Comma-separated rustup components (e.g. clippy,rustfmt)."
    default: ""
  apt:
    description: >-
      Install the Linux system libraries wgpu/winit/cpal need. Set "false" for
      jobs that only touch the no_std chip stack or the wasm32 / web-sys build
      (those route through web-sys, not the native X11/Wayland/ALSA libs).
    default: "true"
  cache:
    description: 'Set "false" to skip the cargo cache (e.g. a fmt-only job).'
    default: "true"
  cache-key:
    description: "Extra Swatinem/rust-cache key suffix (distinguishes target matrices)."
    default: ""
  cache-on-failure:
    description: >-
      Pass-through to Swatinem/rust-cache `cache-on-failure`. Enable on jobs
      whose failures are at the TEST stage (so a flaky test doesn't throw away
      an expensive dependency / release compile); leave "false" elsewhere.
    default: "false"

runs:
  using: composite
  steps:
    # Resolve the toolchain from `rust-toolchain.toml` unless the caller asked
    # for a specific one. This keeps ONE version literal in the repo: bumping
    # the project toolchain is a single edit to `rust-toolchain.toml` and every
    # workflow follows, with no chance of a call site drifting behind.
    #
    # This used to default to `stable`, which was misleading rather than wrong:
    # `rust-toolchain.toml` is a directory override and outranks the `rustup
    # default` this action performs, so every job was ALREADY compiling on the
    # pinned channel (rustup logs "toolchain '<channel>' is currently in use
    # (overridden by .../rust-toolchain.toml)"). The only effect of the
    # `stable` default was to download a second toolchain that nothing then
    # used — and to make the workflows read as though they tested on latest
    # stable, which they never did.
    #
    # Extraction is scoped to the `[toolchain]` TABLE, not "the first `channel`
    # key in the file". A bare `channel = ...` match would take the wrong value
    # if any other table ever gained a `channel` key ahead of `[toolchain]` —
    # silently installing whatever that said, which is exactly the kind of
    # guess the fail-closed design exists to prevent.
    #
    # Only TOML basic (double-quoted) strings are accepted. A literal
    # single-quoted channel is valid TOML but is not used here, and failing
    # loudly on one beats guessing at its value.
    #
    # Fail-closed: an unparseable `rust-toolchain.toml` aborts the job rather
    # than silently falling back to some other channel.
    - name: Resolve Rust toolchain
      id: resolve
      shell: bash
      env:
        REQUESTED: ${{ inputs.toolchain }}
      run: |
        set -euo pipefail
        if [ -n "$REQUESTED" ]; then
          resolved="$REQUESTED"
          echo "Toolchain requested explicitly by the caller: ${resolved}"
        else
          resolved="$(awk '
            /^[[:space:]]*\[/ {
              in_toolchain = /^[[:space:]]*\[toolchain\][[:space:]]*$/
              next
            }
            in_toolchain && match($0, /^[[:space:]]*channel[[:space:]]*=[[:space:]]*"[^"]*"/) {
              v = substr($0, RSTART, RLENGTH)
              sub(/^[^"]*"/, "", v)
              sub(/"$/, "", v)
              print v
              exit
            }
          ' rust-toolchain.toml)"
          if [ -z "$resolved" ]; then
            echo "::error::Could not parse [toolchain].channel (as a double-quoted string) from rust-toolchain.toml"
            exit 1
          fi
          echo "Toolchain resolved from rust-toolchain.toml: ${resolved}"
        fi
        echo "toolchain=${resolved}" >> "$GITHUB_OUTPUT"

    # Pinned to a commit SHA, not `@master`. Every other action in this repo is
    # referenced by a `@vN` tag, which is not expected to move; `@master` is a
    # BRANCH that advances on every upstream commit, so each run silently
    # resolved to whatever HEAD happened to be — no review window, no signal
    # that anything changed. That matters disproportionately here: this
    # composite is consumed by 12 of the repo's 19 checkouts, including
    # `release.yml` (`contents: write`, builds the shipped binaries) and
    # `web.yml` (`pages: write` + `id-token: write`), and it is the action that
    # installs the compiler — a position where a compromise is very hard to
    # detect from the build output.
    #
    # The trailing `# v1` is the convention Dependabot's `github-actions`
    # ecosystem (already enabled in `.github/dependabot.yml`) reads to keep the
    # pin current, so this does not trade a supply-chain risk for a stale-action
    # one. Verified: `refs/tags/v1` -> e97e2d8c at time of pinning.
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
      with:
        toolchain: ${{ steps.resolve.outputs.toolchain }}
        targets: ${{ inputs.targets }}
        components: ${{ inputs.components }}

    - name: Install Linux deps for wgpu/winit/cpal
      if: inputs.apt == 'true' && runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libxkbcommon-dev libwayland-dev libxkbcommon-x11-dev libasound2-dev libudev-dev

    - name: Cargo cache
      if: inputs.cache == 'true'
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ inputs.cache-key }}
        # Only WRITE the cache from the default branch. A PR-branch save is
        # scoped to that branch (no other PR can read it) yet still counts
        # against the 10 GB repo cache budget and LRU-evicts the shared `main`
        # caches every PR restores from — so PR saves are write-only garbage.
        # Restore-on-PR + save-on-main keeps the hit rate high without the
        # thrash (rust-cache README). The post-merge `main` build pays one cold
        # save; PRs are unaffected. Compared against the repo's actual default
        # branch (not a hardcoded "main") so this composite stays correct on a
        # fork or a repo whose default branch is renamed.
        save-if: ${{ github.ref_name == github.event.repository.default_branch }}
        cache-on-failure: ${{ inputs.cache-on-failure }}
