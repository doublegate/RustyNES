# v1.3.0 Sprint 1.1 — wasm32 frontend support.
#
# `--cfg=web_sys_unstable_apis` is required by wgpu's WebGPU backend
# on wasm32 because the WebGPU JS API is still gated behind web-sys's
# `unstable_apis` cfg (the API itself is Baseline-stable as of Jan
# 2026, but the Rust bindings haven't been moved out of the unstable
# tier yet). Without this rustflag, `cargo build --target
# wasm32-unknown-unknown -p rustynes-frontend` fails at link time with
# missing `GpuAdapter` / `GpuCanvasContext` types.
#
# See `docs/audit/v1.3-sprint-1.1-wasm32-research-2026-05-24.md`.

[target.wasm32-unknown-unknown]
# `--cfg=getrandom_backend="wasm_js"` (v1.2.0 Workstream F4): the EXPERIMENTAL
# `script-wasm` build pulls piccolo, whose `ahash` dep activates `getrandom 0.3`
# — and getrandom 0.3 dropped the `js` Cargo feature in favour of this cfg flag
# to select its browser backend. It is INERT for the default wasm build (which
# uses ahash `no-rng`, so getrandom 0.3 isn't compiled at all), so adding it
# unconditionally here is safe; it only takes effect when `script-wasm` brings
# getrandom 0.3 into the graph. (The piccolo `rand` -> getrandom 0.2 path is
# handled by the `getrandom` `js`-feature shim in the frontend's wasm32 deps.)
rustflags = ["--cfg=web_sys_unstable_apis", "--cfg=getrandom_backend=\"wasm_js\""]

# MSRV-aware (v1.3.0 bumped 1.86 -> 1.96) dependency resolution. The workspace pins
# rust-version = "1.96"; `fallback` makes `cargo update` prefer dependency
# versions compatible with that MSRV over the newest available. Without it, a
# future `cargo update` could pull a past-MSRV crate (e.g. `image` >= 0.26, a
# transitive dep of `arboard`'s clipboard image support, which needs a newer
# rustc) and break the pinned-toolchain build. The committed Cargo.lock already
# holds MSRV-safe versions; this guards future resolves.
[resolver]
incompatible-rust-versions = "fallback"

# v1.7.0 "Forge" #54 — the "cargo --full equivalent". One command builds/runs
# the most fully-featured NATIVE binary by activating the frontend's `full`
# feature (the maximal native feature set; see
# `crates/rustynes-frontend/Cargo.toml`). `cargo full-run path/to/rom.nes` Just
# Works: the `full-run` alias ends in `--`, so EVERY arg you put after the alias
# (the ROM path, and flags like `--fullscreen` whose leading dash would otherwise
# be eaten by `cargo run`) is forwarded to the emulator binary, not to Cargo.
# `full-build` takes no binary args, so it has no trailing `--`. These names do
# not collide with any built-in cargo subcommand.
[alias]
full-run = "run --release -p rustynes-frontend --features full --"
full-build = "build --release -p rustynes-frontend --features full"

# Resilient crates.io downloads — the permanent fix for the recurring CI flake.
# Jobs intermittently failed fetching crates with curl errors like
#   "[16] Error in the HTTP2 framing layer"
#   "[56] ... OpenSSL SSL_read: ... unexpected eof while reading"
# a well-known interaction between curl's HTTP/2 multiplexing and the crates.io
# CDN (Fastly). Forcing HTTP/1.1 (`multiplexing = false`) sidesteps the
# framing-layer bug, and a higher `net.retry` lets any remaining transient blip
# self-heal instead of failing the job. This is repo-wide, so it covers EVERY
# cargo invocation: ci.yml, android.yml's `:app:cargoNdkBuild`, pgo.yml, web.yml,
# release.yml, and local builds. (Index fetches already use the sparse protocol
# by default on the pinned 1.96 toolchain; these settings harden the crate
# *download* step, which is where the failures occurred.)
[net]
retry = 10

[http]
multiplexing = false

# Libretro MinGW (`x86_64-pc-windows-gnu`) bindgen ABI override — works around
# an upstream `rust-libretro 0.3.2` bug that makes the Windows buildbot job
# fail to compile. Do not remove without re-testing that target.
#
# `rust-libretro/src/lib.rs`'s `retro_keyboard_callback_fn` carries this
# workaround for bindgen's enum-signedness behaviour:
#
#     cfg_if::cfg_if! {
#         if #[cfg(target_family = "windows")] {
#             let keycode = keycode as i32;
#         }
#     };
#     ... retro_key(keycode) ...
#
# That cfg is too broad. C enum signedness is chosen by the target's *ABI*, not
# its OS family: under the **MSVC** ABI clang gives plain enums `int`, but under
# every other ABI — including **MinGW** (`x86_64-pc-windows-gnu`), which is what
# the libretro buildbot builds with — all-non-negative enums get `unsigned int`.
# So bindgen emits `pub struct retro_key(pub c_uint)` for MinGW while the cast
# above hands it an `i32`, and the crate fails with E0308. Verified locally:
# `x86_64-pc-windows-msvc` -> `c_int` (compiles), `x86_64-pc-windows-gnu` /
# apple / android -> `c_uint` (MinGW is the only one that then breaks). The
# correct upstream fix is `target_env = "msvc"` rather than
# `target_family = "windows"`, but https://github.com/max-m/rust-libretro has
# had no commit since 2023-02 and 0.3.2 is its newest release, so we handle it.
#
# Pointing bindgen's clang at the MSVC triple for this one target reproduces the
# ABI upstream's cast assumes. It is surgical: diffing the two generated
# `bindings_libretro.rs` files shows 28 changed lines, ALL of them enum
# signedness (`#[repr(u32)]` -> `#[repr(i32)]` plus the `retro_key`/`retro_mod`
# newtype fields). Zero struct layouts, function signatures, or type sizes
# move — MinGW and MSVC share the Windows platform ABI (LLP64, same record
# layout), and every libretro enum value is non-negative and fits in `int`, so
# i32/u32 are wire-identical here. `cargo`'s `[env]` applies to build scripts,
# so this reaches bindgen for every invocation (buildbot, CI, local) without
# each one having to remember to export it.
[env]
BINDGEN_EXTRA_CLANG_ARGS_x86_64_pc_windows_gnu = "--target=x86_64-pc-windows-msvc"

# Libretro Cross-Compilation:
# The `crates/rustynes-libretro/Makefile` automatically intercepts the buildbot's
# cross-compiler `CC` and passes it to Cargo via the `CARGO_TARGET_<TRIPLE>_LINKER`
# environment variable.
# If you are compiling cross-targets natively outside of the Makefile, define
# them below (ensure the target is installed via `rustup target add <target>`):
#
# [target.aarch64-linux-android]
# linker = "/path/to/android/ndk/.../bin/aarch64-linux-android-clang"
