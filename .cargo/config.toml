# v1.3.0 Sprint 1.1 — wasm32 frontend support.
#
# `--cfg=web_sys_unstable_apis` is required by wgpu's WebGPU backend
# on wasm32 because the WebGPU JS API is still gated behind web-sys's
# `unstable_apis` cfg (the API itself is Baseline-stable as of Jan
# 2026, but the Rust bindings haven't been moved out of the unstable
# tier yet). Without this rustflag, `cargo build --target
# wasm32-unknown-unknown -p rustynes-frontend` fails at link time with
# missing `GpuAdapter` / `GpuCanvasContext` types.
#
# See `docs/audit/v1.3-sprint-1.1-wasm32-research-2026-05-24.md`.

[target.wasm32-unknown-unknown]
rustflags = ["--cfg=web_sys_unstable_apis"]

# v1.0.0 — MSRV-aware dependency resolution. The workspace pins
# rust-version = "1.86"; `fallback` makes `cargo update` prefer dependency
# versions compatible with that MSRV over the newest available. Without it, a
# future `cargo update` could pull a past-MSRV crate (e.g. `image` >= 0.26, a
# transitive dep of `arboard`'s clipboard image support, which needs a newer
# rustc) and break the pinned-toolchain build. The committed Cargo.lock already
# holds MSRV-safe versions; this guards future resolves.
[resolver]
incompatible-rust-versions = "fallback"
