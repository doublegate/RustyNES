# v1.3.0 Sprint 1.1 â€” wasm32 frontend support.
#
# `--cfg=web_sys_unstable_apis` is required by wgpu's WebGPU backend
# on wasm32 because the WebGPU JS API is still gated behind web-sys's
# `unstable_apis` cfg (the API itself is Baseline-stable as of Jan
# 2026, but the Rust bindings haven't been moved out of the unstable
# tier yet). Without this rustflag, `cargo build --target
# wasm32-unknown-unknown -p rustynes-frontend` fails at link time with
# missing `GpuAdapter` / `GpuCanvasContext` types.
#
# See `docs/audit/v1.3-sprint-1.1-wasm32-research-2026-05-24.md`.

[target.wasm32-unknown-unknown]
# `--cfg=getrandom_backend="wasm_js"` (v1.2.0 Workstream F4): the EXPERIMENTAL
# `script-wasm` build pulls piccolo, whose `ahash` dep activates `getrandom 0.3`
# â€” and getrandom 0.3 dropped the `js` Cargo feature in favour of this cfg flag
# to select its browser backend. It is INERT for the default wasm build (which
# uses ahash `no-rng`, so getrandom 0.3 isn't compiled at all), so adding it
# unconditionally here is safe; it only takes effect when `script-wasm` brings
# getrandom 0.3 into the graph. (The piccolo `rand` -> getrandom 0.2 path is
# handled by the `getrandom` `js`-feature shim in the frontend's wasm32 deps.)
rustflags = ["--cfg=web_sys_unstable_apis", "--cfg=getrandom_backend=\"wasm_js\""]

# MSRV-aware (v1.3.0 bumped 1.86 -> 1.96) dependency resolution. The workspace pins
# rust-version = "1.96"; `fallback` makes `cargo update` prefer dependency
# versions compatible with that MSRV over the newest available. Without it, a
# future `cargo update` could pull a past-MSRV crate (e.g. `image` >= 0.26, a
# transitive dep of `arboard`'s clipboard image support, which needs a newer
# rustc) and break the pinned-toolchain build. The committed Cargo.lock already
# holds MSRV-safe versions; this guards future resolves.
[resolver]
incompatible-rust-versions = "fallback"

# v1.7.0 "Forge" #54 â€” the "cargo --full equivalent". One command builds/runs
# the most fully-featured NATIVE binary by activating the frontend's `full`
# feature (the maximal native feature set; see
# `crates/rustynes-frontend/Cargo.toml`). `cargo full-run path/to/rom.nes` Just
# Works: the `full-run` alias ends in `--`, so EVERY arg you put after the alias
# (the ROM path, and flags like `--fullscreen` whose leading dash would otherwise
# be eaten by `cargo run`) is forwarded to the emulator binary, not to Cargo.
# `full-build` takes no binary args, so it has no trailing `--`. These names do
# not collide with any built-in cargo subcommand.
[alias]
full-run = "run --release -p rustynes-frontend --features full --"
full-build = "build --release -p rustynes-frontend --features full"
