# v1.8.8 "Atlas" (Workstream B): tells AGP's generateLocaleConfig which locale the
# default (unqualified) `res/values/` strings are written in. English here; the
# `values-es/` folder adds Spanish. AGP emits res/xml/_generated_res_locale_config.xml
# from this + the values-* folders and wires it into the manifest as android:localeConfig.
unqualifiedResLocale=en-US
