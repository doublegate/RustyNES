# cargo-deny configuration for RustyNES
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# The prior RUSTSEC-2024-0436 (`paste`, via the old wgpu Metal backend) entry was
# dropped once the wgpu 29 / naga 29 bump removed `metal` (and thus `paste`) from
# the tree. Keep this list minimal — only "unmaintained"/"unsound" informational
# advisories on transitive deps with no safe upgrade; never suppress a real
# exploitable vulnerability.
ignore = [
    # `ttf-parser` unmaintained. NOT a vulnerability — an informational
    # "unmaintained" advisory. It is a pure transitive dep of `winit` (which the
    # workspace pins at 0.30.13) via its Wayland client-side-decoration font
    # stack: winit -> sctk-adwaita -> ab_glyph -> owned_ttf_parser -> ttf-parser
    # 0.25.1 (already the latest release). There is no safe upgrade until winit's
    # decoration stack moves off ab_glyph, so this cannot be resolved from our
    # manifest. Surfaced first by the egui-0.35 PR only because it is the first
    # PR to re-run the security workflow after the advisory was published; `main`
    # carries the identical `ttf-parser 0.25.1` and is affected equally. Revisit
    # when a future winit bump drops the ab_glyph/ttf-parser chain.
    "RUSTSEC-2026-0192",
    # `quick-xml 0.39.4` — two real advisories (quadratic duplicate-attribute
    # scan; unbounded NsReader namespace allocation), BOTH requiring
    # attacker-controlled XML input. Our ONLY consumer is `wayland-scanner`
    # 0.31.10, a PROC-MACRO that parses the vendored Wayland protocol XML
    # files at COMPILE TIME — no runtime code path parses XML at all, and the
    # inputs are trusted files shipped inside the wayland-protocols crates,
    # never external data. No upgrade path exists: 0.39.4 is the max of its
    # line, the fixes live in quick-xml >= 0.40, and wayland-scanner 0.31.10
    # (its own max version) pins ^0.39. Revisit on the next wayland-scanner /
    # smithay-client-toolkit release; remove these the moment the resolve
    # moves quick-xml to >= 0.40.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
version = 2
# Allow dual-licensed MIT/Apache-2.0 (standard Rust licensing) plus compatible OSI/FSF licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",  # Used by unicode-ident crate
    # BSD family licenses (OSI approved, FSF Free/Libre, permissive)
    "BSD-2-Clause",  # Used by arrayref, av1-grain, rav1e, v_frame
    "BSD-3-Clause",  # Used by bindgen, exr, instant, lebe, ravif, tiny-skia
    # Other permissive licenses (OSI approved, FSF Free/Libre)
    "BSL-1.0",       # Boost Software License - used by clipboard-win, error-code
    "ISC",           # ISC License (similar to MIT) - used by inotify, libloading
    "Zlib",          # zlib License (permissive) - used by slotmap
    # Public-domain-equivalent (OSI/FSF, permissive)
    "CC0-1.0",       # Creative Commons Zero - used by hexf-parse (<- naga <- wgpu)
    "CDLA-Permissive-2.0",  # Community Data License Permissive 2.0 - used by webpki-roots (<- ureq <- rustynes-cheevos)
    # Weak copyleft licenses (OSI approved, FSF Free/Libre, file-level copyleft)
    "MPL-2.0",       # Mozilla Public License 2.0 - used by option-ext, resvg, usvg
    # Font licenses (OSI approved, FSF Free/Libre) - used by egui/epaint default fonts
    "OFL-1.1",       # SIL Open Font License 1.1 - used by epaint_default_fonts
    "Ubuntu-font-1.0",  # Ubuntu Font Licence 1.0 - epaint_default_fonts (egui 0.32) declares this SPDX id for its bundled default font
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false
registries = []

[bans]
# Allow duplicate versions since they're caused by transitive dependencies from major
# frameworks (iced, wgpu, image) that require different versions of common crates.
# These duplicates are unavoidable until upstream crates converge on versions.
# Examples: ahash, bitflags, block2, calloop, dirs-sys, fontdb, getrandom, etc.
multiple-versions = "allow"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
