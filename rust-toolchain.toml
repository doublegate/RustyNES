[toolchain]
channel = "1.96.0"
components = ["rustfmt", "clippy"]
# Declare cross-compile targets here so rustup auto-installs them
# whenever any cargo invocation reads this file. Both CI jobs that
# cross-compile (`no_std_check` -> thumbv7em, `wasm` + the web deploy
# -> wasm32) were/would-be failing because `dtolnay/rust-toolchain`
# installs the target for the channel it pins (stable), but cargo's
# `rust-toolchain.toml`-driven switch to 1.86.0 left the target
# uninstalled — `cargo build --target X` then fails with
# `E0463: can't find crate for core` while compiling transitive deps
# (typenum for thumbv7em; cfg-if for wasm32). Declaring them here adds
# the target to the 1.86.0 channel that cargo actually uses, and also
# means `trunk build` + local dev get the wasm32 target for free.
#
# DO NOT add the libretro buildbot's cross targets to this list. That
# buildbot (git.libretro.com, `.gitlab-ci.yml`) hits the exact same trap
# from the other direction: its build image pre-provisions every cross
# target on ITS default toolchain, but the `channel` pin above makes
# rustup install a separate pristine 1.96.0 that carries only the host
# std plus whatever is listed here — so nine of ten jobs died with the
# same `E0463: can't find crate for core` in pipeline #91899. Listing
# the eight triples here would fix it, but at the cost of every
# contributor and every GitHub Actions job downloading ~8 extra
# `rust-std` components on each toolchain install. They are installed
# per-job by `.gitlab-ci.yml` instead, keeping that cost where the need
# is. See the post-mortem comment at the top of `.gitlab-ci.yml`.
#
# BEFORE BUMPING `channel` TO 1.97 OR NEWER, read this. The libretro build
# image injects `-Car=<path>,Clink-arg=...` into EVERY Apple job, and `-C ar`
# — a deprecated no-op for years — became a hard error in Rust 1.97:
#
#   error: `-C ar`: this option has been removed
#
# No job trips it at 1.96.0 — all four Apple jobs merely log the warning.
# The moment this pin reaches 1.97+, all four (`libretro-build-osx-x64`,
# `-osx-arm64`, `-ios-arm64`, `-tvos-arm64`) fail together. The fix is two
# lines in each job's `before_script`:
#
#   - unset CARGO_ENCODED_RUSTFLAGS
#   - export RUSTFLAGS=""
#
# Cargo takes extra flags from exactly one source, first match wins
# (CARGO_ENCODED_RUSTFLAGS -> RUSTFLAGS -> target.<triple>.rustflags ->
# build.rustflags), so that pair wins without needing to know where the
# image sets them. Discarding them is safe: rustc splits `-C` at the FIRST
# `=`, so the whole comma-joined string is consumed as the `ar` value and
# those link arguments have never reached the linker for any core.
targets = ["thumbv7em-none-eabihf", "wasm32-unknown-unknown"]
profile = "default"
