# RustyNES — coturn STUN/TURN config for browser-netplay NAT traversal.
#
# NOTE: the deploy-specific fields (TURN credential, advertised realm, public
# IP) are NOT set here — docker-compose.yml passes them as CLI flags from the
# TURN_USER / TURN_SECRET / TURN_REALM / EXTERNAL_IP env vars (CLI overrides this
# file), so a maintainer configures the deploy with a `.env` and never edits this
# file. See deploy/README.md.
#
# Minimal config: acts as a public STUN server (so a browser learns its public
# mapping) AND a TURN relay (the fallback for symmetric NATs that defeat plain
# hole punching). Browsers point their RtcConfiguration iceServers at this via
# the frontend's [netplay] stun_servers config, e.g.:
#
#   stun_servers = [
#     "stun:turn.example.com:3478",
#     "turn:turn.example.com:3478?transport=udp",
#   ]
#
# (The TURN entry in a browser also needs username/credential fields, which the
# RtcConfiguration object carries; the static-auth-secret / user below is the
# server side.)

# Listening port for STUN/TURN (UDP + TCP).
listening-port=3478

# --- Authentication -----------------------------------------------------------
# Long-term-credential mechanism for TURN relaying. The actual `--user` (TURN
# credential) and `--realm` are injected on the command line from env vars by
# docker-compose.yml (TURN_USER / TURN_SECRET / TURN_REALM) so they are not
# checked in here. For production, prefer `use-auth-secret` + a shared secret
# with short-lived TURN credentials minted by your app instead of a static user.
lt-cred-mech

# --- Hardening (recommended for a public box) ---------------------------------
# Deny relaying to loopback / private ranges to avoid the relay being abused.
no-loopback-peers
no-multicast-peers

# coturn advertises its public address for TURN relay candidates. On a host with
# network_mode: host and a public IP, coturn usually detects this; if it sits
# behind 1:1 NAT, pass --external-ip=<public-ip> via the EXTERNAL_IP env var
# (see docker-compose.yml / deploy/README.md) rather than editing this file.

# Quiet logs to stdout (the container captures them).
no-cli
log-file=stdout
